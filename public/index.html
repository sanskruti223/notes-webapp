<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button id="toggleBtn" onclick="document.body.classList.toggle('sidebar-open')">&#9776;</button>

  <aside class="sidebar">
    <div class="sidebar-top">
      <h2>Notes</h2>
      <button onclick="newNote()">+ New</button>
    </div>
    <input type="text" id="searchInput" placeholder="Search..." oninput="handleSearch()" />
    <ul id="notesList"></ul>
  </aside>

  <main class="main">

    <div id="welcomeScreen">
      <p>Select a note or create a new one.</p>
      <button onclick="newNote()">Create Note</button>
    </div>

    <div id="editorWrap" style="display:none">
      <div class="toolbar">
        <span id="timestamps"></span>
        <div>
          <button onclick="saveNote()">Save</button>
          <button class="del-btn" onclick="confirmDelete()">Delete</button>
        </div>
      </div>
      <div class="editor">
        <input type="text" id="noteTitle" placeholder="Title" />
        <p id="titleErr" style="display:none">Title is required.</p>
        <textarea id="noteContent" placeholder="Write your note here..."></textarea>
      </div>
    </div>

  </main>

  <div id="modal" style="display:none">
    <div class="modal-box">
      <p>Delete this note?</p>
      <button onclick="deleteNote()">Yes, Delete</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
